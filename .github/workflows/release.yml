name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., patch, minor, major, or specific version)'
        required: true
        default: 'patch'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Generate changelog
        id: changelog
        uses: conventional-changelog/conventional-changelog-action@v5
        with:
          preset: 'angular'
          tag-prefix: 'v'
          output-file: 'CHANGELOG.md'
          skip-commit: 'true'
          skip-tag: 'false'

      - name: Bump version and create tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_TYPE="${{ github.event.inputs.version }}"
          else
            VERSION_TYPE="patch"
          fi

          # Navigate to core package and bump version
          cd packages/core
          NEW_VERSION=$(npm version $VERSION_TYPE --no-git-tag-version)
          echo "new_version=${NEW_VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          cd ../..

          # Sync mcp-server version
          cd packages/mcp-server
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          cd ../..

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore(release): ${{ steps.version.outputs.tag_version }} [skip ci]"
          git tag -a "${{ steps.version.outputs.tag_version }}" -m "Release ${{ steps.version.outputs.tag_version }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag_version }}"

      - name: Update changelog
        run: |
          git add CHANGELOG.md
          git commit -m "docs: update changelog [skip ci]" || true
          git push origin HEAD:main || true

      - name: Publish @comptext/core to npm
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @comptext/mcp-server to npm
        working-directory: packages/mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_version }}
          name: Release ${{ steps.version.outputs.tag_version }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Release ${{ steps.version.outputs.tag_version }} published successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "- @comptext/core@${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- @comptext/mcp-server@${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> $GITHUB_STEP_SUMMARY
